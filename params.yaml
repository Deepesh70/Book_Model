# RAG System Configuration
rag:
  embedding:
    model: "all-MiniLM-L6-v2"
    chunk_size: 1000
    chunk_overlap: 200

  vectorstore:
    persist_dir: "faiss_store"
    index_type: "faiss"

  llm:
    provider: "groq"
    model: "llama-3.1-8b-instant"
    temperature: 0.1
    max_tokens: 1000

  retrieval:
    top_k: 5
    similarity_threshold: 0.7

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: "*"
  reload: true

# Data Configuration
data:
  input_dir: "data"
  supported_formats:
    - "pdf"
    - "txt"
    - "csv"
    - "xlsx"
    - "docx"
    - "json"

# Logging Configuration
logging:
  level: "INFO"
  format: "[%(levelname)s] %(asctime)s - %(name)s - %(message)s"

# Theory Synthesis Configuration (for /generate-theory endpoint)
theory_synthesis:
  top_k: 8                   # chunks to retrieve for context
  distance_threshold: 1.0    # L2 distance cutoff — below = relevant, above = fallback
  default_provider: "gemini" # "gemini" | "groq"  (change here, no code edits needed)
  gemini_model: "gemini-2.0-flash"
  groq_model: "llama-3.3-70b-versatile"
  temperature: 0.4

# Local PDF Ingestion Configuration (for ingest.py)
# Place your PDFs in: theory_books/<SubjectName>/*.pdf
ingestion:
  books_dir: "theory_books"
